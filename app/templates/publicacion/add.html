{% extends "base.html" %}
{% block titulo_pagina %}Agregar Publicación{% endblock %}
{% block content %}

    <form action="{{ url_for('publicacion.add') }}" method="post">
        <div class="form-group mb-3">
            <label for="titulo" class="form-label">Título:</label>
            <input type="text" id="titulo" name="titulo" class="form-control" required>
        </div>
        <div class="form-group mb-3">
            <label for="contenido" class="form-label">Contenido:</label>
            <textarea id="contenido" name="contenido" class="form-control" rows="5"></textarea>
        </div>
        <div class="form-group mb-3">
            <label class="form-label">Etiquetas:</label>
            {% for e in etiquetas %}
            <div class="form-check">
                <input class="form-check-input" type="checkbox" name="etiquetas" value="{{ e.id }}" id="etiqueta{{ e.id }}">
                <label class="form-check-label" for="etiqueta{{ e.id }}">{{ e.nombre }}</label>
            </div>
            {% endfor %}
        </div>
        <button type="submit" class="btn btn-primary">Guardar</button>
        <a href="{{ url_for('perfil.mi_perfil') }}" class="btn btn-secondary">Cancelar</a>
    </form>

{% endblock %}
