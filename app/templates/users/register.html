{% extends "base.html" %}
{% block content %}
<h2>Registro de usuario</h2>

{% if errors %}
  <ul style="color:red;">
    {% for error in errors %}
      <li>{{ error }}</li>
    {% endfor %}
  </ul>
{% endif %}

<form method="POST" action="{{ url_for('user.register') }}">
  <label>Nombre</label>
  <input type="text" name="nameUser" value="{{ nameUser }}" required>

  <label>Email</label>
  <input type="email" name="emailUser" value="{{ emailUser }}" required>

  <label>Contraseña</label>
  <input type="password" name="passwordUser" required>

  <button type="submit">Registrarse</button>
</form>

<a href="{{ url_for('user.index') }}">Volver</a>
{% endblock %}
