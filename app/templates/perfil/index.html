{% extends "base.html" %}
{% block titulo_pagina %}Lista de Perfiles{% endblock %}
{% block content %}

    <div class="text-start mb-3">
        <a href="{{ url_for('perfil.add') }}" class="btn btn-primary btn-sm">
            <i class="bi bi-plus-circle"></i> Agregar Perfil
        </a>
    </div>

    <table class="table table-striped table-bordered align-middle">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Usuario</th>
                <th>Bio</th>
                <th>Publicaciones</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for p in data %}
            <tr>
                <td>{{ p.id }}</td>
                <td>{{ p.usuario.nameUser }}</td>
                <td>{{ p.bio or '—' }}</td>
                <td>
                    <span class="badge bg-primary">{{ p.usuario.publicaciones.count() }}</span>
                </td>
                <td>
                    <a href="{{ url_for('perfil.ver_publicaciones', id=p.id) }}" class="btn btn-info btn-sm">
                        <i class="bi bi-eye"></i>
                    </a>
                    <a href="{{ url_for('perfil.edit', id=p.id) }}" class="btn btn-primary btn-sm">
                        <i class="bi bi-pencil-square"></i>
                    </a>
                    <a href="{{ url_for('perfil.delete', id=p.id) }}" class="btn btn-danger btn-sm">
                        <i class="bi bi-trash"></i>
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

{% endblock %}
