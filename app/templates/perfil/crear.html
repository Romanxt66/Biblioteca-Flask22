{% extends "base.html" %}
{% block titulo_pagina %}Crear mi Perfil{% endblock %}
{% block content %}

    <form action="{{ url_for('perfil.crear_mio') }}" method="post">
        <div class="form-group mb-3">
            <label class="form-label">Usuario:</label>
            <input type="text" class="form-control" value="{{ current_user.nameUser }}" disabled>
        </div>
        <div class="form-group mb-3">
            <label for="bio" class="form-label">Bio:</label>
            <textarea id="bio" name="bio" class="form-control" rows="3" placeholder="Escribe una bio corta..."></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Crear Perfil</button>
    </form>

{% endblock %}
