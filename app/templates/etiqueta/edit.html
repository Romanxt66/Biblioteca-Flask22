{% extends "base.html" %}
{% block titulo_pagina %}Editar Etiqueta{% endblock %}
{% block content %}

    <form action="{{ url_for('etiqueta.edit', id=etiqueta.id) }}" method="post">
        <div class="form-group mb-3">
            <label for="nombre" class="form-label">Nombre:</label>
            <input type="text" id="nombre" name="nombre" class="form-control" value="{{ etiqueta.nombre }}" required>
        </div>
        <div class="form-group mb-3">
            <label for="slug" class="form-label">Slug:</label>
            <input type="text" id="slug" name="slug" class="form-control" value="{{ etiqueta.slug }}" required>
        </div>
        <button type="submit" class="btn btn-primary">Guardar cambios</button>
        <a href="{{ url_for('etiqueta.index') }}" class="btn btn-secondary">Cancelar</a>
    </form>

{% endblock %}
