{% extends "base.html" %}
{% block titulo_pagina %}Lista de Etiquetas{% endblock %}
{% block content %}

    <div class="text-start mb-3">
        <a href="{{ url_for('etiqueta.add') }}" class="btn btn-primary btn-sm">
            <i class="bi bi-plus-circle"></i> Agregar Etiqueta
        </a>
    </div>

    <table class="table table-striped table-bordered align-middle">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Slug</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for e in data %}
            <tr>
                <td>{{ e.id }}</td>
                <td>
                    <a href="{{ url_for('etiqueta.ver', id=e.id) }}">{{ e.nombre }}</a>
                </td>
                <td>{{ e.slug }}</td>
                <td>
                    <a href="{{ url_for('etiqueta.edit', id=e.id) }}" class="btn btn-primary btn-sm">
                        <i class="bi bi-pencil-square"></i>
                    </a>
                    <a href="{{ url_for('etiqueta.delete', id=e.id) }}" class="btn btn-danger btn-sm">
                        <i class="bi bi-trash"></i>
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

{% endblock %}
