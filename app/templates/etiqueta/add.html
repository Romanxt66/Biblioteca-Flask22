{% extends "base.html" %}
{% block page_title %}Agregar Etiqueta{% endblock %}
{% block header_icon %}tag{% endblock %}
{% block titulo_pagina %}Nueva Etiqueta{% endblock %}

{% block content %}

<div style="max-width:440px;margin:0 auto;">

  <form action="{{ url_for('etiqueta.add') }}" method="post" id="addEtiquetaForm">

    <!-- Nombre -->
    <div class="mb-3">
      <label for="nombre" class="form-label">Nombre</label>
      <div class="input-icon-wrap">
        <i class="bi bi-tag"></i>
        <input type="text" id="nombre" name="nombre" class="form-control"
               placeholder="ej. Tecnología" required
               oninput="generateSlug(this.value)">
      </div>
    </div>

    <!-- Slug -->
    <div class="mb-4">
      <label for="slug" class="form-label">
        Slug
        <span style="font-size:0.72rem;color:var(--text-muted);font-weight:400;margin-left:0.4rem;">
          (auto-generado, puedes editar)
        </span>
      </label>
      <div class="input-icon-wrap">
        <i class="bi bi-link-45deg"></i>
        <input type="text" id="slug" name="slug" class="form-control"
               placeholder="ej. tecnologia" required
               style="font-family:var(--font-mono);font-size:0.85rem;">
      </div>
    </div>

    <!-- Actions -->
    <div class="d-flex gap-2 flex-wrap">
      <button type="submit" class="btn btn-primary flex-grow-1" id="btnGuardarEtiqueta">
        <i class="bi bi-check-circle"></i> Guardar etiqueta
      </button>
      <a href="{{ url_for('etiqueta.index') }}" class="btn btn-secondary" id="btnCancelarEtiqueta">
        <i class="bi bi-x-circle"></i> Cancelar
      </a>
    </div>

  </form>
</div>

<script>
  function generateSlug(value) {
    const slug = value
      .toLowerCase()
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '')  // remove accents
      .replace(/[^a-z0-9\s-]/g, '')
      .trim()
      .replace(/\s+/g, '-');
    document.getElementById('slug').value = slug;
  }
</script>

{% endblock %}
